name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/cloudflare-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deploy/cloudflare-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Test
        run: npm test
